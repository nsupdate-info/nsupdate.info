{% extends "base.html" %}
{% load i18n %}{% load django_bootstrap5 %}

{% block content %}
    <div class="row">
         <div class="col-lg-8">
            <div class="card mb-4">
                <div class="card-header">
                    <h3 class="m-0">{% blocktrans %}Delete {{ object }}{% endblocktrans %}</h3>
                </div>
                <div class="card-body">
                    <form action="" method="post">
                        {% csrf_token %}
                        <p>{% blocktrans %}Are you sure you want to delete "{{ object }}"?{% endblocktrans %}</p>
                        <button type="submit" class="btn btn-primary btn-danger">{% trans "Confirm" %}</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
