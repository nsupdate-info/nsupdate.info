{% extends "base.html" %}
{% load i18n %}{% load django_bootstrap5 %}

{% block content %}
<div class="row">
    <div class="col-md-3">
        <div class="card mb-4">
            <div class="card-header">
                <h3 class="card-title mb-0">Personal settings</h3>
            </div>
            <div class="list-group list-group-flush">
                <a href="{% url 'account_profile' %}" class="list-group-item list-group-item-action">Profile</a>
                <a href="{% url 'account_settings' %}" class="list-group-item list-group-item-action">Account settings</a>
            </div>
        </div>
    </div>
    <div class="col-md-9">
         {% block settings_panel %}
         {% endblock %}
    </div>
</div>
{% endblock %}
